<!DOCTYPE html>
<html>
<head>
    <title>HomeLinks Ghana</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <h1>HomeLinks Ghana</h1>
    <p>Connecting You to Home</p>
</header>

<section class="hero">
    <h2>Find Verified Houses in Ghana</h2>
    <p>No scams. Only trusted listings.</p>
</section>

<section class="listings">
    <h2>Available Houses</h2>

    <div class="house">
        <img src="https://via.placeholder.com/300" />
        <h3>Self Contained - Madina</h3>
        <p>GHS 800/month</p>
        <p class="verified">Verified ✅</p>
    </div>

    <div class="house">
        <img src="https://via.placeholder.com/300" />
        <h3>Chamber & Hall - Adenta</h3>
        <p>GHS 600/month</p>
        <p class="verified">Verified ✅</p>
    </div>

</section>

<section class="form">
    <h2>List Your Property</h2>

    <form>
        <input type="text" placeholder="Your Name" required>
        <input type="text" placeholder="Phone Number" required>
        <input type="text" placeholder="Location" required>
        <button type="submit">Submit</button>
    </form>
</section>

</body>
</html>
